name: Publish Python Package

on:
  push:
    tags:
      - "v*"

jobs:
  build-n-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/image2svg*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Verify server.json version matches the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SJ="$(jq -r '.version' server.json)"
          if [ "$TAG" != "$SJ" ]; then
            echo "::error::server.json version ($SJ) != tag ($TAG). Run scripts/bump.sh before tagging." >&2
            exit 1
          fi
          echo "server.json version $SJ matches tag v$TAG"

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: |
          for attempt in 1 2 3 4 5; do
            if ./mcp-publisher publish; then
              echo "Published to MCP Registry."
              exit 0
            fi
            echo "Attempt $attempt failed (PyPI may still be propagating); retrying in 30s..."
            sleep 30
          done
          echo "MCP Registry publish failed after 5 attempts." >&2
          exit 1
